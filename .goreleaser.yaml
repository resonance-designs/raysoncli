version: 2

project_name: rayson

before:
  hooks:
    - go mod tidy

builds:
  - id: rayson
    main: ./cmd/rayson
    binary: rayson
    goos: [windows, linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/resonance-designs/rayson/cmd.Commit={{.Commit}}
      - -X github.com/resonance-designs/rayson/cmd.BuildDate={{.Date}}

archives:
  - id: rayson
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  github:
    owner: resonance-designs
    name: rayson
  mode: replace
  prerelease: auto

changelog:
  disable: true
