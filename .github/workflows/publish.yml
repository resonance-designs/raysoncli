name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install JS dependencies
        run: npm ci

      - name: Sync release version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm run version:sync -- "$VERSION"

      - name: Install GoReleaser
        run: go install github.com/goreleaser/goreleaser/v2/goreleaser@latest

      - name: Publish release artifacts
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
