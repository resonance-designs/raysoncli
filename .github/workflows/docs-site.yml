name: Publish Docs

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs-site
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install docs dependencies
        run: npm --prefix docs-site ci

      - name: Build docs
        run: npm --prefix docs-site run build

      - name: Setup Pages
        id: configure_pages_primary
        uses: actions/configure-pages@v5
        continue-on-error: true
        with:
          enablement: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages (fallback token)
        id: configure_pages_fallback
        if: steps.configure_pages_primary.outcome != 'success' && secrets.GH_PAGES_TOKEN != ''
        uses: actions/configure-pages@v5
        with:
          enablement: true
          token: ${{ secrets.GH_PAGES_TOKEN }}

      - name: Manual Pages setup required
        if: steps.configure_pages_primary.outcome != 'success' && steps.configure_pages_fallback.outcome != 'success'
        run: |
          echo "GitHub Pages could not be configured with this workflow token."
          echo "Enable Pages for this repo once in Settings > Pages with Source: GitHub Actions,"
          echo "or add a repo secret named GH_PAGES_TOKEN with admin-level permissions."
          exit 1

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
