name: Publish Docs

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: docs-site
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    env:
      GH_PAGES_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install docs dependencies
        run: npm --prefix docs-site ci

      - name: Build docs
        run: npm --prefix docs-site run build

      - name: Setup Pages with GitHub token
        id: configure_pages
        uses: actions/configure-pages@v5
        continue-on-error: true
        with:
          enablement: true
          token: ${{ github.token }}

      - name: Setup Pages with repository token
        id: configure_pages_pat
        if: steps.configure_pages.outcome != 'success' && env.GH_PAGES_TOKEN != ''
        uses: actions/configure-pages@v5
        with:
          enablement: true
          token: ${{ env.GH_PAGES_TOKEN }}

      - name: Manual Pages setup required
        if: steps.configure_pages.outcome != 'success' && steps.configure_pages_pat.outcome != 'success'
        run: |
          echo "GitHub Pages could not be configured with available credentials."
          echo "Please enable Pages for the repository and ensure the workflow token has Pages write access."
          echo "For Organizations, verify permissions/allowed actor policies for GITHUB_TOKEN."
          exit 1

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
